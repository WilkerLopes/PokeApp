<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="icon" href="./favicon.ico" />
    <title>PokeApp - Redirecionando</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@100;400&display=swap"
      rel="stylesheet"
    />
    <meta http-equiv="refresh" content="5; URL='https://pokeapp.wilker.xyz'" />

    <style>
      * {
        font-family: "Lexend", sans-serif;
      }
    </style>
  </head>
  <body>
    <center>
      <h1>Redirecionando</h1>
      <p>
        Este site mudou. Estamos redirecionando você para o novo site em
        <span id="seconds">5</span>
        segundos.
      </p>
      <p>
        Se o navegador não redirecionar você automaticamente, clique no link:
        <a href="https://pokeapp.wilker.xyz"> PokeApp</a>.
      </p>
    </center>

    <script>
      var time = 4;

      var cron = setInterval(() => {
        document.getElementById("seconds").innerText = time;
        time > 0 ? time-- : clearInterval(cron);
      }, 1000);
    </script>
  </body>
</html>
